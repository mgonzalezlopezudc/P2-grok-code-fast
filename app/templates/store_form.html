{% extends "base.html" %}

{% block title %}New Store - FIWARE Supermarkets{% endblock %}

{% block content %}
<h1>New Store</h1>
<form method="post" novalidate>
    <label for="name">Name:</label>
    <input type="text" id="name" name="name" required><br>
    <label for="streetAddress">Street Address:</label>
    <input type="text" id="streetAddress" name="streetAddress" required><br>
    <label for="addressRegion">Region:</label>
    <input type="text" id="addressRegion" name="addressRegion" required><br>
    <label for="addressLocality">Locality:</label>
    <input type="text" id="addressLocality" name="addressLocality" required><br>
    <label for="postalCode">Postal Code:</label>
    <input type="text" id="postalCode" name="postalCode" required><br>
    <label for="longitude">Longitude:</label>
    <input type="number" id="longitude" name="longitude" step="any" required><br>
    <label for="latitude">Latitude:</label>
    <input type="number" id="latitude" name="latitude" step="any" required><br>
    <label for="capacity">Capacity:</label>
    <input type="number" id="capacity" name="capacity" required><br>
    <button type="submit">Create</button>
</form>
{% endblock %}
