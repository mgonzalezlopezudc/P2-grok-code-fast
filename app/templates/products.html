{% extends "base.html" %}

{% block title %}Products - FIWARE Supermarkets{% endblock %}

{% block content %}
<h1>Products</h1>
<a href="{{ url_for('main.new_product') }}">New Product</a>
<ul>
{% for product in products %}
    <li><a href="{{ url_for('main.product_detail', id=product.id) }}">{{ product.name }}</a> - ${{ product.price }}
        <a href="{{ url_for('main.edit_product', id=product.id) }}">Edit</a>
        <form method="post" action="{{ url_for('main.delete_product', id=product.id) }}" style="display:inline;">
            <button type="submit" onclick="return confirm('Delete?')">Delete</button>
        </form>
    </li>
{% endfor %}
</ul>
{% endblock %}
