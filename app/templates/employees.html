{% extends "base.html" %}

{% block title %}Employees - FIWARE Supermarkets{% endblock %}

{% block content %}
<h1 class="mb-4"><i class="fas fa-users"></i> Employees</h1>
<div class="d-flex justify-content-between align-items-center mb-3">
    <p class="mb-0">Manage your team members</p>
    <a href="{{ url_for('main.new_employee') }}" class="btn btn-primary">
        <i class="fas fa-plus"></i> New Employee
    </a>
</div>
<div class="row">
    {% for employee in employees %}
    <div class="col-md-6 col-lg-4 mb-3">
        <div class="card h-100">
            <div class="card-body d-flex flex-column">
                <h5 class="card-title">{{ employee.name }}</h5>
                <p class="card-text">{{ employee.role }}</p>
                <div class="mt-auto">
                    <a href="{{ url_for('main.edit_employee', id=employee.id) }}" class="btn btn-outline-secondary btn-sm me-2">
                        <i class="fas fa-edit"></i> Edit
                    </a>
                    <form method="post" action="{{ url_for('main.delete_employee', id=employee.id) }}" class="d-inline" onsubmit="return confirm('Are you sure you want to delete this employee?');">
                        <button type="submit" class="btn btn-outline-danger btn-sm">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
