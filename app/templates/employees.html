{% extends "base.html" %}

{% block title %}Employees - FIWARE Supermarkets{% endblock %}

{% block content %}
<h1>Employees</h1>
<a href="{{ url_for('main.new_employee') }}">New Employee</a>
<ul>
{% for employee in employees %}
    <li>{{ employee.name }} - {{ employee.role }}
        <a href="{{ url_for('main.edit_employee', id=employee.id) }}">Edit</a>
        <form method="post" action="{{ url_for('main.delete_employee', id=employee.id) }}" style="display:inline;">
            <button type="submit" onclick="return confirm('Delete?')">Delete</button>
        </form>
    </li>
{% endfor %}
</ul>
{% endblock %}
