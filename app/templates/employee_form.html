{% extends "base.html" %}

{% block title %}{% if employee %}Edit{% else %}New{% endif %} Employee - FIWARE Supermarkets{% endblock %}

{% block content %}
<h1>{% if employee %}Edit{% else %}New{% endif %} Employee</h1>
<form method="post" novalidate>
    <label for="name">Name:</label>
    <input type="text" id="name" name="name" value="{{ employee.name if employee else '' }}" required><br>
    <label for="salary">Salary:</label>
    <input type="number" id="salary" name="salary" step="0.01" value="{{ employee.salary if employee else '' }}" required><br>
    <label for="role">Role:</label>
    <input type="text" id="role" name="role" value="{{ employee.role if employee else '' }}" required><br>
    <label for="refStore">Store:</label>
    <select id="refStore" name="refStore" required>
        {% for store in stores %}
        <option value="{{ store.id }}" {% if employee and employee.refStore == store.id %}selected{% endif %}>{{ store.name }}</option>
        {% endfor %}
    </select><br>
    <label for="email">Email:</label>
    <input type="email" id="email" name="email" value="{{ employee.email if employee else '' }}" required><br>
    <label for="dateOfContract">Date of Contract:</label>
    <input type="date" id="dateOfContract" name="dateOfContract" value="{{ employee.dateOfContract if employee else '' }}" required><br>
    <label for="skills">Skills (comma-separated):</label>
    <input type="text" id="skills" name="skills" value="{{ employee.skills | join(', ') if employee else '' }}"><br>
    <label for="username">Username:</label>
    <input type="text" id="username" name="username" value="{{ employee.username if employee else '' }}" required><br>
    <label for="password">Password:</label>
    <input type="password" id="password" name="password" value="{{ employee.password if employee else '' }}" required><br>
    <label for="image">Image URL:</label>
    <input type="url" id="image" name="image" value="{{ employee.image if employee else '' }}"><br>
    <button type="submit">{% if employee %}Update{% else %}Create{% endif %}</button>
</form>
{% endblock %}
