{% extends "base.html" %}

{% block title %}{% if employee %}Edit{% else %}New{% endif %} Employee - FIWARE Supermarkets{% endblock %}

{% block content %}
<h1 class="mb-4"><i class="fas fa-{% if employee %}edit{% else %}plus{% endif %}"></i> {% if employee %}Edit{% else %}New{% endif %} Employee</h1>
<div class="row justify-content-center">
    <div class="col-md-10 col-lg-8">
        <div class="card">
            <div class="card-body">
                <form method="post" novalidate>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="name" class="form-label">Name</label>
                            <input type="text" class="form-control" id="name" name="name" value="{{ employee.name if employee else '' }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email" value="{{ employee.email if employee else '' }}" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="role" class="form-label">Role</label>
                            <input type="text" class="form-control" id="role" name="role" value="{{ employee.role if employee else '' }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="salary" class="form-label">Salary</label>
                            <input type="number" class="form-control" id="salary" name="salary" step="0.01" value="{{ employee.salary if employee else '' }}" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="refStore" class="form-label">Store</label>
                        <select class="form-select" id="refStore" name="refStore" required>
                            {% for store in stores %}
                            <option value="{{ store.id }}" {% if employee and employee.refStore == store.id %}selected{% endif %}>{{ store.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" class="form-control" id="username" name="username" value="{{ employee.username if employee else '' }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password" value="{{ employee.password if employee else '' }}" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="dateOfContract" class="form-label">Date of Contract</label>
                        <input type="date" class="form-control" id="dateOfContract" name="dateOfContract" value="{{ employee.dateOfContract if employee else '' }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="skills" class="form-label">Skills (comma-separated)</label>
                        <input type="text" class="form-control" id="skills" name="skills" value="{{ employee.skills | join(', ') if employee else '' }}">
                    </div>
                    <div class="mb-3">
                        <label for="image" class="form-label">Image URL</label>
                        <input type="url" class="form-control" id="image" name="image" value="{{ employee.image if employee else '' }}">
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> {% if employee %}Update{% else %}Create{% endif %} Employee
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
