<!DOCTYPE html>
<html lang="{{ current_locale }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FIWARE Supermarkets{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
    <header>
        <nav>
            <a href="{{ url_for('main.home') }}">Home</a>
            <a href="{{ url_for('main.products') }}">Products</a>
            <a href="{{ url_for('main.stores') }}">Stores</a>
            <a href="{{ url_for('main.employees') }}">Employees</a>
            <a href="{{ url_for('main.stores_map') }}">Stores Map</a>
            <select id="lang-selector">
                <option value="es" {% if current_locale == 'es' %}selected{% endif %}>Español</option>
                <option value="en" {% if current_locale == 'en' %}selected{% endif %}>English</option>
            </select>
            <script>
                document.getElementById('lang-selector').addEventListener('change', function() {
                    const form = document.createElement('form');
                    form.method = 'post';
                    form.action = '/set-language';
                    const input = document.createElement('input');
                    input.type = 'hidden';
                    input.name = 'lang';
                    input.value = this.value;
                    form.appendChild(input);
                    document.body.appendChild(form);
                    form.submit();
                });
            </script>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        window.I18N = {
            price_changed: "Price changed",
            low_stock: "Low stock alert"
        };
    </script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
