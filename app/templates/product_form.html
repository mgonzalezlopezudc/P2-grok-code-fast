{% extends "base.html" %}

{% block title %}{% if product %}Edit{% else %}New{% endif %} Product - FIWARE Supermarkets{% endblock %}

{% block content %}
<h1 class="mb-4"><i class="fas fa-{% if product %}edit{% else %}plus{% endif %}"></i> {% if product %}Edit{% else %}New{% endif %} Product</h1>
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card">
            <div class="card-body">
                <form method="post" novalidate>
                    <div class="mb-3">
                        <label for="name" class="form-label">Name</label>
                        <input type="text" class="form-control" id="name" name="name" value="{{ product.name if product else '' }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="price" class="form-label">Price</label>
                        <input type="number" class="form-control" id="price" name="price" step="0.01" value="{{ product.price if product else '' }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="size" class="form-label">Size</label>
                        <select class="form-select" id="size" name="size" required>
                            <option value="XS" {% if product and product.size == 'XS' %}selected{% endif %}>XS</option>
                            <option value="S" {% if product and product.size == 'S' %}selected{% endif %}>S</option>
                            <option value="M" {% if product and product.size == 'M' %}selected{% endif %}>M</option>
                            <option value="L" {% if product and product.size == 'L' %}selected{% endif %}>L</option>
                            <option value="XL" {% if product and product.size == 'XL' %}selected{% endif %}>XL</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="color" class="form-label">Color (#RRGGBB)</label>
                        <input type="text" class="form-control" id="color" name="color" pattern="#[0-9A-Fa-f]{6}" value="{{ product.color if product else '' }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="image" class="form-label">Image URL</label>
                        <input type="url" class="form-control" id="image" name="image" value="{{ product.image if product else '' }}">
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> {% if product %}Update{% else %}Create{% endif %} Product
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
