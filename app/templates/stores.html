{% extends "base.html" %}

{% block title %}Stores - FIWARE Supermarkets{% endblock %}

{% block content %}
<h1>Stores</h1>
<a href="{{ url_for('main.new_store') }}">New Store</a>
<ul>
{% for store in stores %}
    <li>{{ store.name }} - {{ store.address.streetAddress }}, {{ store.address.addressLocality }}</li>
{% endfor %}
</ul>
{% endblock %}
